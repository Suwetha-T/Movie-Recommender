<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="hero login-hero">
    <div class="overlay center-box">
        <div class="login-box">
            <h1>🎬 Movie Recommendation</h1>

            <input type="text" id="user" placeholder="Username"><br><br>
            <input type="password" id="pass" placeholder="Password"><br><br>

            <button onclick="login()">Login</button>
            <p id="loginMsg"></p>
        </div>
    </div>
</div>

<script>
function login(){
    let u=document.getElementById("user").value;
    let p=document.getElementById("pass").value;

    if(u==="admin" && p==="1234"){
        localStorage.setItem("loggedIn","true");
        window.location.href="index.html";
    } else {
        document.getElementById("loginMsg").innerText="Invalid!";
    }
}
</script>

</body>
</html>
