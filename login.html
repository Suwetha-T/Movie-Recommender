<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <h2>🎬 Movie App</h2>

<h1>Login</h1>

<input type="text" id="user" placeholder="Username"><br><br>
<input type="password" id="pass" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

<p id="loginMsg"></p>

<script>
function login(){
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if(u==="admin" && p==="1234"){
        document.getElementById("loginMsg").innerText="Success!";
    } else {
        document.getElementById("loginMsg").innerText="Wrong!";
    }
}
</script>

</body>
</html>
