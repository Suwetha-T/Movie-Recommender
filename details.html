<!DOCTYPE html>
<html>
<head>
    <title>Details</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <h2>🎬 Movie App</h2>
    <a href="index.html">Home</a>
</nav>

<div id="details"></div>

<script>
const API_KEY = "9d25509d";

const params = new URLSearchParams(window.location.search);
const title = params.get("title");

fetch(`https://www.omdbapi.com/?t=${title}&apikey=${API_KEY}`)
.then(res=>res.json())
.then(data=>{
    document.getElementById("details").innerHTML=`
        <h2>${data.Title}</h2>
        <img src="${data.Poster}">
        <p>${data.Year}</p>
        <p>${data.Genre}</p>
        <p>${data.imdbRating}</p>
        <p>${data.Plot}</p>
    `;
});
</script>

</body>
</html>
